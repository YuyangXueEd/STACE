# Code Synthesizer Model Configuration
#
# Uses OpenRouter-hosted model for code generation
# and repair tasks.
#
# Model capabilities:
# - Production-grade reasoning tuned for code synthesis/repair
# - Large context window suitable for maintaining synthesis → execute → repair history
#   in a single conversation, improving repair quality through contextual continuity

model_name: "anthropic/claude-sonnet-4.5"
model_platform: "openrouter"
base_url: "https://openrouter.ai/api/v1"
requires_api_key: true
api_key_env_var: "OPENROUTER_API_KEY"

config:
  # Model parameters
  temperature: 0.2  # Low temperature for more deterministic code generation
  max_tokens: 32000  # Increased for larger model capacity and complex code artifacts

  # Ollama-specific settings (if needed)
  # Note: These may vary based on CAMEL's OllamaModel implementation
  # Refer to external/camel/docs/reference/camel.models.ollama_model for details

  # Code generation optimizations
  top_p: 0.9
  frequency_penalty: 0.0
  presence_penalty: 0.0

# Metadata
metadata:
  deployment: "openrouter"
  description: "OpenRouter-hosted model for concept-erasure attack code synthesis and repair"
  use_case: "Code generation and repair for diffusion model security research"
  architecture_decision: "Single agent handles both synthesis and repair for context continuity"
  last_updated: "2025-10-29"
