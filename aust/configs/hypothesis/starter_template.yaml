# Hypothesis Seed Template derived from CRCE (Coreference-Retention Concept Erasure)
#
# This template captures a ready-to-use hypothesis scaffold that aligns with the
# output schema expected by `hypothesis_generator_concept_erasure.yaml`.
# It is grounded in the paper card: `.paper_cards/any-to-v/input_level/2503.14232.md`
# and highlights the CRCE-Leak probing methodology.

seed_template:

  id: coref_probing_starter

  summary: >
    CRCE-Leak repurposes CRCE's certainty-weighted coreferential (coref) and retained
    concept lists as attack prompts to probe erased diffusion models for residual
    leakage and collateral damage. It exposes under-erasure,
    over-erasure, and semantic manifold misalignment vulnerabilities.

  target_type: "general" # e.g., "style", "object", "attribute", "general"
  source_paper: "2503.14232" # arXiv ID or DOI, or 'empirical'

  default_hypothesis:
    attack_type: coref_probing
    target_type: "objects"
    description: >
      Use CRCE's LLM-generated coreferential prompts and certainty weights as probes.
      Generate diverse prompt variants for each high-certainty coref, sample multiple
      images.
    experiment_design: |
      1. Use LLM to prompt and obtain corefs, retains, and certainty weights for the erased concept.
      2. For each high/medium certainty coref, create 3-5 stylistic prompt variants (photograph, cinematic portrait, illustrated character, etc.).
      3. Sample 8-16 images per prompt across CFG ∈ {5, 7.5, 10} and diffusion steps ∈ {50, 100, 150}.
    confidence_score: 0.5
    novelty_score: 0.0
