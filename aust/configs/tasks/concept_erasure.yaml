# Concept Erasure Task Configuration
#
# Defines task-level settings that apply to concept-erasure workflows across
# all inner-loop runs. Seed templates are managed separately via
# `configs/prompts/starter_template.yaml` so that we can update or swap them
# without modifying this task descriptor.

task_type: concept_erasure

task_summary: >
  Concept erasure tasks evaluate whether an unlearning procedure successfully
  removes a targeted concept from a text-to-image diffusion model without
  damaging retained content. The inner loop explores prompting strategies,
  evaluation signals, and detection metrics that can reveal residual leakage
  or collateral damage.

task_objectives:
  - Probe for residual generation of erased concepts (under-erasure)
  - Detect over-erasure that harms preserved concepts or styles
  - Stress-test the erased model using adversarial prompts and scorecards

default_parameters:
  max_iterations: 3
  debate_enabled: true
  rag_top_k: 5

prompt_guidance:
  hypothesis_config: prompts/hypothesis_generator_concept_erasure.yaml
  critic_config: prompts/critic.yaml

# Seed templates loaded from external file
seed_templates:
  - file:prompts/starter_template.yaml

metadata:
  last_updated: "2025-10-24"
  owner: "concept-erasure-research"
  notes: >
    Seed hypothesis templates are injected at runtime from
    `configs/prompts/starter_template.yaml`. Additional task-specific
    prompts or templates can be layered without touching this file.
